<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Matos Agent Chat</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="bg-orb orb-a"></div>
    <div class="bg-orb orb-b"></div>

    <main class="app-shell">
      <section class="panel panel-config">
        <div class="brand-row">
          <div class="brand-dot" aria-hidden="true"></div>
          <h1>Matos Agent Playground</h1>
        </div>
        <p class="subtitle">Test web professionnel du meme agent, sans WhatsApp obligatoire.</p>

        <label for="bridgeUrl">Bridge URL (recommande)</label>
        <input id="bridgeUrl" type="url" placeholder="https://matos-whatsapp-bridge-xxx.run.app" />

        <label for="userId">User ID</label>
        <input id="userId" type="text" placeholder="demo-user-1" />

        <div class="btn-row">
          <button id="saveBtn" class="btn btn-primary" type="button">Sauvegarder</button>
          <button id="pingBtn" class="btn" type="button">Tester connexion</button>
        </div>

        <p id="status" class="status idle">Configurez votre agent pour commencer.</p>

        <div class="tips">
          <p class="tips-title">Prompts rapides</p>
          <button class="chip" type="button" data-prompt="Bonjour, je cherche un laptop">Laptop</button>
          <button class="chip" type="button" data-prompt="niko na tafuta machine ya 16go RAM">16go RAM</button>
          <button class="chip" type="button" data-prompt="Je prends ce modele, je m'appelle Amina, email amina@example.com">Lead</button>
        </div>
      </section>

      <section class="panel panel-chat">
        <header class="chat-header">
          <h2>Conversation</h2>
          <span id="sessionLabel" class="session-label">session: -</span>
        </header>

        <div id="messages" class="messages" aria-live="polite"></div>

        <form id="chatForm" class="chat-form">
          <input id="messageInput" type="text" placeholder="Ex: niko na tafuta machine ya 16go RAM" autocomplete="off" required />
          <button id="sendBtn" class="btn btn-primary" type="submit">Envoyer</button>
        </form>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
